version: '3.8'

services:
  backend:
    build: .
    container_name: casablanca_backend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - mysql

  mysql:
    image: mysql:8
    container_name: casablanca_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: tu_password_segura
      MYSQL_DATABASE: casablanca_db
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
